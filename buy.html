<!DOCTYPE html>
<html>
<head>
<title>Buy Now</title>
<style>
body{
font-family: Arial;
margin:0;
background:#ffe6f2;
}
.navbar{
background:#cc0066;
padding:15px;
text-align:center;
}
.navbar a{
color:white;
margin:15px;
text-decoration:none;
}
.container{
background:white;
width:60%;
margin:30px auto;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px gray;
}
input, select{
padding:10px;
margin:10px;
width:80%;
}
button{
background:#ff3399;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
}
button:hover{
background:#cc0066;
}
.success{
color:green;
display:none;
}
</style>
</head>
<body>
<div class="navbar">
<a href="index.html">Home</a>
</div>
<div class="container">
<h1>🛍️ Buy Product</h1>
<p>Price: ₹499</p>
<form id="form">
<input type="text" placeholder="Name" required><br>
<input type="text" placeholder="Address" required><br>
<select id="qty">
<option value="1">1 Item</option>
<option value="2">2 Items</option>
<option value="3">3 Items</option>
</select><br>
<button type="submit">Place Order</button>
</form>
<h3>Total: ₹<span id="total">499</span></h3>
<p class="success" id="success">Order Placed Successfully!</p>
</div>
<script>
let qty=document.getElementById("qty");
let total=document.getElementById("total");
qty.addEventListener("change",()=>{
total.innerText=499*qty.value;
});
document.getElementById("form").addEventListener("submit",(e)=>{
e.preventDefault();
document.getElementById("success").style.display="block";});
</script>
</body>
</html>
